<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e6fffb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            border: 2px solid #81d8d0;
            width: 320px;
        }

        h1 {
            color: #0f4c5c;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            background: #81d8d0;
            color: white;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: bold;
        }

        .reward {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
        }

        .gift {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Добро пожаловать 💎</h1>

        <div class="badge">Доступ разрешён</div>

        <p class="reward">
            Пользователь: <b>{{ email }}</b>
        </p>

        <div class="gift">
            🎁 Ты получил бонус: <br>
            <b>секретный режим разблокирован</b>
        </div>
    </div>

</body>
</html>
