<!DOCTY<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Регистрация</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family: Arial, sans-serif;

    background:
        linear-gradient(
            135deg,
            #06181b,
            #0d2c2f,
            #144347
        );

    overflow:hidden;
}

/* появление карточки */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* пульс фона */

@keyframes glow{
    0%{
        box-shadow:0 0 10px rgba(45,127,122,.25);
    }

    50%{
        box-shadow:0 0 28px rgba(45,127,122,.45);
    }

    100%{
        box-shadow:0 0 10px rgba(45,127,122,.25);
    }
}

.card{
    width:360px;

    background:#0d2629;

    padding:32px;

    border-radius:24px;

    border:1px solid #2d7f7a;

    animation:
        fadeUp .7s ease,
        glow 4s infinite;

    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
}

h1{
    text-align:center;

    color:#d7fffa;

    margin-bottom:22px;

    font-size:30px;
}

form{
    display:flex;
    flex-direction:column;
    gap:14px;
}

input{
    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    outline:none;

    font-size:15px;

    background:#14363a;

    color:white;

    transition:.25s;
}

input::placeholder{
    color:#8bcac2;
}

input:focus{
    transform:scale(1.02);

    box-shadow:
        0 0 0 2px rgba(129,216,208,.3);
}

button{
    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-size:15px;
    font-weight:bold;

    color:white;

    background:
        linear-gradient(
            135deg,
            #2d7f7a,
            #46b8b0
        );

    transition:.25s;
}

button:hover{
    transform:translateY(-2px);

    box-shadow:
        0 8px 20px rgba(70,184,176,.35);
}

a{
    display:block;

    text-align:center;

    margin-top:18px;

    color:#8ed5cb;

    text-decoration:none;

    transition:.2s;
}

a:hover{
    color:#d7fffa;
}
</style>

</head>
<body>

<div class="card">

    <h1>Регистрация</h1>

    <form action="/signup/processing" method="post">

        <input
            type="text"
            name="nickname"
            placeholder="Nickname"
        >

        <input
            type="password"
            name="password"
            placeholder="Пароль"
        >

        <button type="submit">
            Создать аккаунт
        </button>

    </form>

    <a href="/">
        Назад
    </a>

</div>

</body>
</html>
