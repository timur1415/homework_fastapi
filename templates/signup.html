<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVI ✦ | Регистрация</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: #000;
        overflow: hidden;
      }

      .blur {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        z-index: 0;
      }

      .blur1 {
        width: 350px;
        height: 350px;

        background: #59d6c9;

        top: -120px;
        left: -120px;

        opacity: 0.12;

        animation: float1 10s ease-in-out infinite;
      }

      .blur2 {
        width: 300px;
        height: 300px;

        background: #59d6c9;

        bottom: -120px;
        right: -120px;

        opacity: 0.08;

        animation: float2 12s ease-in-out infinite;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes glow {
        0%,
        100% {
          box-shadow: 0 0 15px rgba(89, 214, 201, 0.08);
        }

        50% {
          box-shadow: 0 0 40px rgba(89, 214, 201, 0.18);
        }
      }

      @keyframes float1 {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(40px);
        }
      }

      @keyframes float2 {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-40px);
        }
      }

      /* Новый фон: медленно вращающийся конусный градиент */
      .bg-gradient{
        position: fixed;
        inset: 0;
        z-index: -4;
        opacity: 0.12;
        background: conic-gradient(from 90deg at 50% 50%, #0b0f10, #0b1212, #0b0f10, #0b1212);
        filter: blur(80px) saturate(120%);
        animation: rotateGradient 30s linear infinite;
        pointer-events: none;
      }

      @keyframes rotateGradient{
        from{transform: rotate(0deg);} 
        to{transform: rotate(360deg);} 
      }

      /* Дополнительный тональный слой для глубины */
      .bg-velvet{
        position: fixed;
        inset: 0;
        z-index: -3;
        background: radial-gradient(circle at 20% 20%, rgba(89,214,201,0.06), transparent 15%),
                    radial-gradient(circle at 80% 80%, rgba(89,214,201,0.04), transparent 18%);
        pointer-events: none;
      }

      @keyframes starGlow {
        0%,
        100% {
          opacity: 0.7;
          text-shadow: 0 0 10px rgba(89, 214, 201, 0.3);
        }

        50% {
          opacity: 1;
          text-shadow:
            0 0 25px rgba(89, 214, 201, 0.8),
            0 0 40px rgba(89, 214, 201, 0.4);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }

        20% {
          transform: translateX(-8px);
        }

        40% {
          transform: translateX(8px);
        }

        60% {
          transform: translateX(-8px);
        }

        80% {
          transform: translateX(8px);
        }
      }

      .card {
        width: 380px;
        position: relative;
        z-index: 2;

        background: rgba(12, 12, 12, 0.92);
        backdrop-filter: blur(20px);

        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;

        padding: 34px;

        animation:
          fadeUp 0.8s ease,
          glow 5s infinite;

        transition: 0.35s;
      }

      .card:hover {
        transform: translateY(-5px) scale(1.01);
      }

      .logo {
        text-align: center;
        font-size: 42px;
        font-weight: 800;
        letter-spacing: 4px;
        color: white;
        margin-bottom: 8px;
      }

      .logo span {
        color: #59d6c9;
        animation: starGlow 3s infinite;
      }

      .subtitle {
        text-align: center;
        color: #8b949e;
        font-size: 14px;
        margin-bottom: 28px;
      }

      h1 {
        text-align: center;
        color: white;
        margin-bottom: 12px;
        font-size: 30px;
      }

      .line {
        width: 60px;
        height: 4px;
        border-radius: 999px;
        background: #59d6c9;
        margin: 0 auto 24px auto;
      }

      .error {
        margin-bottom: 15px;
        padding: 12px;

        border-radius: 12px;

        background: rgba(255, 70, 70, 0.12);

        border: 1px solid rgba(255, 70, 70, 0.3);

        color: #ff7a7a;

        text-align: center;

        font-size: 14px;

        animation: shake 0.5s ease;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      input {
        width: 100%;

        padding: 15px;

        border: none;

        border-radius: 14px;

        outline: none;

        background: #131313;

        color: white;

        font-size: 15px;

        transition: 0.25s;
      }

      input:focus {
        transform: scale(1.02);

        background: #181818;

        box-shadow: 0 0 0 2px rgba(89, 214, 201, 0.25);
      }

      input::placeholder {
        color: #6b7280;
      }

      input:focus {
        background: #181818;
        box-shadow: 0 0 0 2px rgba(89, 214, 201, 0.25);
      }

      button {
        width: 100%;

        padding: 15px;

        border: none;

        border-radius: 14px;

        cursor: pointer;

        font-size: 15px;

        font-weight: bold;

        background: #59d6c9;

        color: black;

        transition: 0.25s;
      }

      button:hover {
        transform: translateY(-3px) scale(1.02);

        box-shadow: 0 10px 25px rgba(89, 214, 201, 0.25);
      }

      a {
        display: block;
        text-align: center;
        margin-top: 18px;
        color: #8b949e;
        text-decoration: none;
      }

      a:hover {
        color: #59d6c9;
      }
    </style>
  </head>

  <body>
    <div class="blur blur1"></div>
    <div class="blur blur2"></div>
    <div class="bg-gradient"></div>
    <div class="bg-velvet"></div>

    <div class="card">
      <div class="logo">NOVI <span>✦</span></div>

      <div class="subtitle">Исследуй новый мир 🌍</div>

      <h1>Регистрация</h1>

      <div class="line"></div>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form action="/signup/processing" method="post">
        <input type="text" name="nickname" placeholder="Nickname" required />

        <input
          type="password"
          name="password"
          placeholder="Пароль"
        />
        <button type="submit">Создать аккаунт</button>
      </form>

      <a href="/">Уже есть аккаунт?</a>
    </div>
  </body>
</html>
