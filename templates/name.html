<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #d8fdf7;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 2px solid #81d8d0;
            width: 320px;
            text-align: center;
        }

        h1 {
            color: #0f4c5c;
            margin-bottom: 20px;
        }

        .field {
            font-size: 18px;
            margin: 8px 0;
            color: #000000;
        }

        .label {
            font-weight: bold;
            color: #0f4c5c;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #a3dbdb;
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            transition: 0.2s;
        }

        a:hover {
            background: #4fbfb4;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Ваши данные 💎</h1>

        <div class="field"><span class="label">Имя:</span> {{ first_name }}</div>
        <div class="field"><span class="label">Фамилия:</span> {{ last_name }}</div>
        <div class="field"><span class="label">Отчество:</span> {{ surname }}</div>

        <a href="/">назад</a>
    </div>

</body>
</html>
