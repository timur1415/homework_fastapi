<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>{{ nickname }}</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    min-height:100vh;

    background:
        radial-gradient(circle at top, #2e8b8b 0%, #0b2d30 40%, #07191b 100%);

    padding:40px 20px;

    display:flex;
    justify-content:center;
}

.container{
    width:650px;
}

/* PROFILE */

.profile{
    background: rgba(13,38,41,.95);

    border-radius:24px;

    padding:24px;

    border:1px solid rgba(129,216,208,.45);

    box-shadow:
        0 15px 40px rgba(0,0,0,.35);
}

.profile-top{
    display:flex;
    align-items:center;
    gap:16px;
}

.avatar{
    width:74px;
    height:74px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:34px;

    background: linear-gradient(
        135deg,
        #59d6c9,
        #2f8f88
    );
}

.name{
    font-size:28px;
    font-weight:700;

    color:#d7fffa;
}

.desc{
    margin-top:6px;

    color:#8ed5cb;
}

/* stats */

.stats{
    display:flex;
    gap:14px;

    margin-top:20px;
}

.stat{
    flex:1;

    padding:14px;

    border-radius:18px;

    text-align:center;

    background:#12363a;
}

.stat-num{
    font-size:22px;
    font-weight:700;
    color:#d7fffa;
}

.stat-label{
    font-size:14px;
    color:#86c8bf;
    margin-top:5px;
}

.profile-btn{
    margin-top:18px;

    background:#2d7f7a;

    color:white;

    text-align:center;

    padding:14px;

    border-radius:16px;

    font-weight:bold;
}

/* post */

.post{
    margin-top:24px;

    background: rgba(13,38,41,.96);

    border-radius:24px;

    overflow:hidden;

    border:1px solid rgba(129,216,208,.35);

    box-shadow:
        0 15px 40px rgba(0,0,0,.35);
}

.post-header{
    padding:18px;
    font-weight:bold;
    color:#d7fffa;
}

.post-img{
    width:100%;
    height:430px;
}

.post-img img{
    width:100%;
    height:100%;

    object-fit:cover;
    display:block;
}

.post-text{
    padding:18px;

    color:#d7fffa;
}

.like{
    color:#74ffe7;
    margin-right:8px;
}

/* gallery */

.gallery-title{
    margin-top:24px;
    margin-bottom:14px;

    font-size:20px;
    color:#d7fffa;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

.gallery-item{
    height:130px;

    border-radius:16px;

    background:linear-gradient(
        135deg,
        #1d5053,
        #2f8f88
    );
}
</style>

</head>
<body>

<div class="container">

    <div class="profile">

        <div class="profile-top">

            <div class="avatar">
                😎
            </div>

            <div>
                <div class="name">{{ nickname }}</div>
                <div class="desc">
                    мой мини профиль ✨
                </div>
            </div>

        </div>

        <div class="stats">

            <div class="stat">
                <div class="stat-num">1</div>
                <div class="stat-label">пост</div>
            </div>

            <div class="stat">
                <div class="stat-num">247</div>
                <div class="stat-label">подписчиков</div>
            </div>

            <div class="stat">
                <div class="stat-num">89</div>
                <div class="stat-label">подписок</div>
            </div>

        </div>

        <div class="profile-btn">
            Редактировать профиль
        </div>

    </div>


    <div class="post">

        <div class="post-header">
            {{ nickname }}
        </div>

        <div class="post-img">
            <img src="{{ photo_url }}" alt="post photo">
        </div>

        <div class="post-text">
            <span class="like">♥</span>
            Первый пост в профиле @{{ nickname }}
        </div>

    </div>


    <div class="gallery-title">
        Галерея
    </div>

    <div class="gallery">
        <div class="gallery-item"></div>
        <div class="gallery-item"></div>
        <div class="gallery-item"></div>
    </div>

</div>

</body>
</html>
