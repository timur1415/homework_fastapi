<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVI ✦ | Требуется вход</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
font-family:Arial,sans-serif;
overflow:hidden;
}

.blur{
position:absolute;
border-radius:50%;
filter:blur(120px);
z-index:0;
}

.blur1{
width:350px;
height:350px;
background:#59d6c9;
top:-120px;
left:-120px;
opacity:.12;
animation:float1 8s ease-in-out infinite;
}

.blur2{
width:300px;
height:300px;
background:#59d6c9;
bottom:-120px;
right:-120px;
opacity:.08;
animation:float2 10s ease-in-out infinite;
}

.card{
position:relative;
z-index:2;
width:420px;
padding:36px;
text-align:center;
background:rgba(12,12,12,.85);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.05);
border-radius:28px;
animation:show .6s ease;
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
}

.logo{
font-size:36px;
font-weight:900;
letter-spacing:4px;
margin-bottom:10px;
color:white;
}

.logo span{
color:#59d6c9;
text-shadow:
0 0 10px #59d6c9,
0 0 25px #59d6c9,
0 0 50px #59d6c9;
}

h1{
margin-top:20px;
font-size:28px;
color:white;
}

p{
margin-top:14px;
color:#d1d5db;
line-height:1.6;
}

.actions{
margin-top:28px;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:15px;
border-radius:14px;
text-decoration:none;
font-weight:700;
transition:.25s;
}
.btn-primary{
background:#59d6c9;
color:black;
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(89,214,201,.25);
}

.btn-secondary{
background:#131313;
color:white;
border:1px solid rgba(255,255,255,.05);
}

.btn-secondary:hover{
border-color:#59d6c9;
color:#59d6c9;
}

.btn-cancel{
color:#8b949e;
}

.btn-cancel:hover{
color:white;
}

@keyframes show{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes float1{
0%,100%{transform:translate(0,0);}
50%{transform:translate(30px,20px);}
}

@keyframes float2{
0%,100%{transform:translate(0,0);}
50%{transform:translate(-30px,-20px);}
}

</style>
</head>

<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="card">

<div class="logo">
NOVI <span>✦</span>
</div>

<h1>Требуется вход</h1>

<p>
Чтобы открыть профиль и получить доступ ко всем возможностям NOVI,
необходимо войти в существующий аккаунт или создать новый.
</p>

<div class="actions">

<a href="/login" class="btn btn-primary">
Войти
</a>

<a href="/signup" class="btn btn-secondary">
Создать аккаунт
</a>

<a href="/" class="btn btn-cancel">
Вернуться назад
</a>

</div>

</div>

</body>
</html>
